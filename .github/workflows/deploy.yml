---
name: 🚀 CI - Deploy
on:
  workflow_dispatch:
concurrency:
  group: deploy
  cancel-in-progress: false
permissions: {}
jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Env & Deps
        # keep @main, do not change
        uses: cyberskill-official/.github/actions/env-deps@a914c67463fc842d7e5314d81e11f6bded0e3211 # main

      - name: Build
        # keep @main, do not change
        uses: cyberskill-official/.github/actions/build@a914c67463fc842d7e5314d81e11f6bded0e3211 # main

      - name: Generate SBOM
        run: npx -y @cyclonedx/cdxgen@12.1.5 -o bom.json  # pinned — bump explicitly

      - name: Security Audit
        run: pnpm audit --audit-level=moderate --ignore-registry-errors

      - name: Deploy
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release
